<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petrol Calculator</title>
    <!-- Link to the external CSS file for styling -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Petrol Calculator</h1>
        <!-- Form for user input -->
        <form id="petrolForm">
            <!-- Input field for cost per liter with default value -->
            <label for="costPerLiter">Cost per Liter (£):</label>
            <input type="number" id="costPerLiter" step="0.01" value="1.72" required>
            
            <!-- Input field for number of liters with default value -->
            <label for="liters">Number of Liters:</label>
            <input type="number" id="liters" step="0.01" value="0" required>
            
            <!-- Button to calculate total cost -->
            <button type="button" id="calculateBtn">Calculate Total Cost</button>
        </form>
        
        <!-- Paragraph to display the total cost -->
        <p id="totalCost">Total Cost: £0.00</p>
    </div>
    
    <!-- Link to the external JavaScript file for functionality -->
    <script src="index.js"></script>
</body>
</html>
