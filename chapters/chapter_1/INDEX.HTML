<!DOCTYPE html>
<html lang="en">
<head>

  <title>Three Images – Mountains Theme</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Mountains Around the World</h1>

  <div class="img-container">
    <div class="img-box">
      <img src="MOUNT.jpg"

           width="350" height="230"

      <img src="rocky mountAIN.jpeg" 
           alt="Rocky mountain range in Canada"
           width="350" height="230"
           title="Canadian Rockies – Canada">
      <p>License: Free to use under the Unsplash License.</p>
    </div>

    <div class="img-box">
      <img src="FIJI.webp" 
           alt="Sunset over Mount Fuji in Japan"
           width="350" height="230"

    </div>
  </div>

</body>
</html>
